<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found · Diogo Serino</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2306111F'/><text x='50' y='72' font-family='system-ui,sans-serif' font-weight='900' font-size='58' text-anchor='middle' fill='%233B6FFF'>D</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:      #06111F;
            --navy-800:  #0C1D33;
            --accent:    #3B6FFF;
            --accent-br: #7BA7FF;
            --muted:     rgba(255,255,255,.42);
            --border:    rgba(255,255,255,.08);
            --font-head: 'Space Grotesk', -apple-system, sans-serif;
            --font:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --nav-h:     64px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font);
            background: var(--navy);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }
        a { text-decoration: none; color: inherit; }

        /* Nav */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(6,17,31,.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .nav-inner {
            max-width: 1160px; margin: 0 auto; padding: 0 24px;
            height: 100%; display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            font-family: var(--font-head); font-size: 18px;
            font-weight: 800; color: #fff; letter-spacing: -.5px;
        }
        .logo span { color: var(--accent); }
        .nav-back {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 13px; font-weight: 500; color: var(--muted);
            transition: color .2s;
        }
        .nav-back svg { transition: transform .2s; }
        .nav-back:hover { color: #fff; }
        .nav-back:hover svg { transform: translateX(-2px); }

        /* Hero */
        .hero {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: calc(var(--nav-h) + 48px) 24px 64px;
            position: relative; overflow: hidden;
            background-image:
                radial-gradient(ellipse 60% 50% at 50% 40%, rgba(59,111,255,.14) 0%, transparent 70%),
                radial-gradient(circle at 12% 80%, rgba(123,167,255,.06) 0%, transparent 50%);
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,.026) 1px, transparent 1px);
            background-size: 32px 32px; pointer-events: none;
        }
        .hero-inner {
            position: relative; text-align: center; max-width: 560px;
        }
        .code {
            font-family: var(--font-head);
            font-size: clamp(96px, 18vw, 180px);
            font-weight: 800;
            line-height: .88;
            letter-spacing: -6px;
            background: linear-gradient(140deg, #fff 0%, #fff 30%, var(--accent-br) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            display: block;
        }
        .hero-title {
            font-family: var(--font-head);
            font-size: clamp(22px, 3vw, 28px);
            font-weight: 700; color: #fff;
            letter-spacing: -.4px; margin-bottom: 14px;
        }
        .hero-sub {
            font-size: 16px; color: var(--muted);
            line-height: 1.72; margin-bottom: 40px;
        }
        .actions {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 11px 20px; border-radius: 9px;
            font-family: var(--font); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .2s; border: none;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
            box-shadow: 0 4px 16px rgba(59,111,255,.3);
        }
        .btn-primary:hover {
            background: #2B5FEF; transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(59,111,255,.4);
        }
        .btn-ghost {
            background: rgba(255,255,255,.07); color: rgba(255,255,255,.8);
            border: 1.5px solid rgba(255,255,255,.18);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.35); color: #fff;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 22px 24px; text-align: center;
            font-size: 13px; color: rgba(255,255,255,.22);
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; align-items: center; }
            .btn { width: 200px; justify-content: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="logo">DMS<span>.</span></a>
        <a href="index.html" class="nav-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            Back to portfolio
        </a>
    </div>
</nav>

<div class="hero">
    <div class="hero-inner">
        <span class="code">404</span>
        <h1 class="hero-title">Page not found</h1>
        <p class="hero-sub">This URL doesn't exist — but the portfolio does.<br>Pick a direction:</p>
        <div class="actions">
            <a href="index.html" class="btn btn-primary">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Homepage
            </a>
            <a href="index.html#projects" class="btn btn-ghost">
                Projects
            </a>
            <a href="index.html#articles" class="btn btn-ghost">
                Articles
            </a>
            <a href="about.html" class="btn btn-ghost">
                About
            </a>
        </div>
    </div>
</div>

<footer>© 2026 Diogo Martins Serino</footer>

</body>
</html>
